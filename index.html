<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#020810">
<title>ROBO PREMIER LEAGUE 2026 — Live Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   BASE RESET
════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --neon:#00f5ff; --acid:#aaff00; --gold:#ffcc00; --silver:#b8c8d8;
  --red:#ff4455;  --orange:#ffaa00; --purple:#2bff00; --pink:#ffe100;
  --bg:#020810;   --panel:#091828;  --panel2:#071220;
  --border:rgba(0,245,255,.18); --border2:rgba(255,255,255,.06);
  --text:#d0eeff; --dim:rgba(200,232,255,.65);
  --fm:'Share Tech Mono',monospace;
  --fd:'Orbitron',sans-serif;
  --fr:'Rajdhani',sans-serif;
  --r:4px;
  --nav-h:54px;
  --mobnav-h:58px;
}

html{scroll-behavior:smooth;height:100%;font-size:16px}
body{
  background:var(--bg);color:var(--text);font-family:var(--fm);
  min-height:100vh;overflow-x:hidden;line-height:1.45;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}

/* scanline — large screens only */
@media(min-width:1400px){
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg,rgba(0,0,0,.032) 0px,rgba(0,0,0,.032) 1px,transparent 1px,transparent 5px);}
}

/* grid bg */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,245,255,.025)1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.025)1px,transparent 1px);background-size:clamp(28px,3vw,80px) clamp(28px,3vw,80px)}

/* ambient glows */
.ambient{position:fixed;top:clamp(-200px,-15vw,-60px);left:50%;transform:translateX(-50%);width:clamp(600px,120vw,4200px);height:clamp(200px,25vw,1200px);border-radius:50%;pointer-events:none;z-index:0;background:radial-gradient(ellipse,rgba(0,245,255,.055) 0%,transparent 68%)}
.ambient2{position:fixed;bottom:clamp(-200px,-15vw,-50px);right:clamp(-200px,-10vw,-30px);width:clamp(200px,40vw,1800px);height:clamp(150px,30vw,1200px);border-radius:50%;pointer-events:none;z-index:0;background:radial-gradient(ellipse,rgba(170,255,0,.022) 0%,transparent 70%)}

/* particles */
#pts{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.pt{position:absolute;border-radius:50%;background:var(--neon);animation:pf linear infinite;opacity:0;width:clamp(1px,.05vw,2px);height:clamp(1px,.05vw,2px)}
@keyframes pf{0%{opacity:0;transform:translateY(100vh)}10%{opacity:.55}90%{opacity:.08}100%{opacity:0;transform:translateY(-6vh) translateX(18px)}}

/* ════ LAYOUT ════ */
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ════ NAVBAR ════ */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 clamp(.6rem,2vw,3.5rem);height:var(--nav-h);min-height:var(--nav-h);border-bottom:2px solid var(--border);background:linear-gradient(180deg,rgba(2,6,14,.99),rgba(4,14,30,.96));position:sticky;top:0;z-index:200;gap:.5rem}
.nl{display:flex;align-items:center;gap:clamp(.35rem,.8vw,1.4rem);flex:1;min-width:0}
.nlogo{height:clamp(22px,3vw,58px);width:auto;flex-shrink:0;object-fit:contain;filter:drop-shadow(0 0 clamp(4px,.5vw,16px) rgba(0,245,255,.28))}
.nr{display:flex;align-items:center;gap:clamp(.3rem,.5vw,1.1rem);flex-shrink:0}

/* pills */
.pill{display:flex;align-items:center;gap:clamp(.2rem,.3vw,.55rem);border:clamp(1px,.08vw,2px) solid;padding:clamp(.18rem,.3vw,.45rem) clamp(.45rem,.7vw,1.3rem);font-size:clamp(.48rem,.65vw,1rem);letter-spacing:.15em;white-space:nowrap;border-radius:2px}
.plive{border-color:rgba(0,245,255,.38);color:var(--neon);background:rgba(0,245,255,.07)}
.padmin{border-color:rgba(255,170,0,.45);color:var(--orange);background:rgba(255,170,0,.07);display:none}
.ldot{width:clamp(5px,.5vw,13px);height:clamp(5px,.5vw,13px);border-radius:50%;background:var(--neon);flex-shrink:0;animation:ld 1.2s infinite;box-shadow:0 0 clamp(4px,.5vw,14px) var(--neon)}
@keyframes ld{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.18;transform:scale(.45)}}
.gchip{background:rgba(0,245,255,.14);border:1px solid rgba(0,245,255,.38);color:var(--neon);font-size:clamp(.42rem,.5vw,.78rem);padding:.08rem clamp(.3rem,.4vw,.65rem);letter-spacing:.12em}

/* nav buttons */
.bnav{background:transparent;border:clamp(1px,.08vw,2px) solid;font-family:var(--fm);font-size:clamp(.48rem,.65vw,1rem);padding:clamp(.22rem,.35vw,.55rem) clamp(.55rem,.9vw,1.6rem);cursor:pointer;letter-spacing:.12em;display:flex;align-items:center;gap:.3rem;white-space:nowrap;transition:background .2s,box-shadow .2s;border-radius:2px}
.bopen{border-color:rgba(255,170,0,.5);color:var(--orange)}.bopen:hover{background:rgba(255,170,0,.11)}
.bexit{border-color:rgba(255,68,85,.5);color:var(--red);display:none}.bexit:hover{background:rgba(255,68,85,.11)}

/* countdown bar */
.cbar{height:clamp(2px,.15vw,3px);background:linear-gradient(90deg,var(--neon),var(--acid),var(--neon));background-size:200% 100%;animation:cbarShift 4s linear infinite;transition:width 1s linear;opacity:.42;width:100%}
@keyframes cbarShift{0%{background-position:0%}100%{background-position:200%}}

/* ════ HERO ════ */
.hero{text-align:center;padding:clamp(.9rem,3vw,3.5rem) 1rem clamp(.7rem,2vw,2rem);position:relative}
.hero-eye{font-family:var(--fd);font-size:clamp(.48rem,.65vw,1.1rem);letter-spacing:clamp(.2em,.4vw,.55em);color:var(--neon);opacity:.5;margin-bottom:clamp(.3rem,.5vw,.7rem)}
.hero-h1{font-family:var(--fd);font-weight:900;line-height:.92;font-size:clamp(1.6rem,7vw,8rem);color:#fff;letter-spacing:.04em;text-shadow:0 0 clamp(30px,5vw,100px) rgba(0,245,255,.32),0 4px 0 rgba(0,0,0,.6)}
.hero-h1 span{color:var(--neon);text-shadow:0 0 clamp(25px,4vw,70px) rgba(0,245,255,.65)}
.hero-meta{display:flex;justify-content:center;gap:clamp(1rem,4vw,5rem);margin-top:clamp(.5rem,.8vw,1.1rem);font-size:clamp(.52rem,.8vw,1.3rem);color:var(--dim);flex-wrap:wrap}
.hero-meta b{color:var(--neon);font-family:var(--fd);letter-spacing:.08em}
.hero-line{width:clamp(100px,20vw,700px);height:clamp(1px,.1vw,2px);margin:clamp(.6rem,1vw,1.5rem) auto 0;background:linear-gradient(90deg,transparent,var(--neon),transparent);opacity:.28}

/* ════ EVENT TABS ════ */
.tscroll{overflow-x:auto;border-bottom:2px solid var(--border);scrollbar-width:none;background:rgba(0,0,0,.12)}
.tscroll::-webkit-scrollbar{display:none}
.trow{display:flex;min-width:max-content}
.etab{background:transparent;border:none;border-bottom:clamp(2px,.2vw,4px) solid transparent;padding:clamp(.38rem,.8vw,1.3rem) clamp(.6rem,1.8vw,3rem);font-family:var(--fm);font-size:clamp(.52rem,.7vw,1.2rem);letter-spacing:.14em;color:var(--dim);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:clamp(.12rem,.25vw,.45rem);white-space:nowrap;transition:color .2s,border-color .2s,background .2s}
.etab.active{color:var(--neon);border-bottom-color:var(--neon);background:rgba(0,245,255,.045);text-shadow:0 0 18px rgba(0,245,255,.38)}
.etab:hover:not(.active){color:var(--text);background:rgba(255,255,255,.015)}
.etab.dis{opacity:.16;pointer-events:none;filter:grayscale(1)}
.eico{font-size:clamp(.9rem,1.5vw,2.4rem);line-height:1}

/* ════ GRADE TABS ════ */
.cscroll{overflow-x:auto;background:rgba(0,0,0,.22);scrollbar-width:none}
.cscroll::-webkit-scrollbar{display:none}
.crow{display:flex;min-width:max-content;padding:0 clamp(.3rem,.5vw,1rem)}
.ctab{background:transparent;border:none;border-bottom:clamp(2px,.2vw,3px) solid transparent;padding:clamp(.3rem,.55vw,1rem) clamp(.55rem,1.2vw,2.4rem);font-family:var(--fr);font-size:clamp(.52rem,.7vw,1.6rem);letter-spacing:.18em;font-weight:700;color:var(--dim);cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s}
.ctab.active{color:var(--acid);border-bottom-color:var(--acid);text-shadow:0 0 18px rgba(170,255,0,.35)}
.ctab:hover:not(.active){color:var(--text)}

/* ════ VIEW BAR ════ */
.vbar{display:flex;gap:clamp(.3rem,.5vw,.9rem);padding:clamp(.38rem,.6vw,1.1rem) clamp(.7rem,1.5vw,2.5rem);border-bottom:1px solid var(--border);background:rgba(0,0,0,.1);flex-wrap:wrap}
.vbtn{background:transparent;border:clamp(1px,.08vw,2px) solid var(--border);padding:clamp(.22rem,.35vw,.6rem) clamp(.55rem,1vw,2.2rem);font-family:var(--fm);font-size:clamp(.48rem,.6vw,1rem);letter-spacing:.13em;color:var(--dim);cursor:pointer;transition:all .2s;border-radius:2px}
.vbtn.active{border-color:var(--neon);color:var(--neon);background:rgba(0,245,255,.07);box-shadow:0 0 16px rgba(0,245,255,.09)}
.vbtn:hover:not(.active){border-color:rgba(200,232,255,.28);color:var(--text)}

/* ════ MAIN ════ */
.main{padding:clamp(.5rem,1.2vw,2.2rem) clamp(.5rem,1.5vw,3rem);flex:1}

/* ════ LOADING / ERROR / EMPTY ════ */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(3rem,8vw,10rem) 2rem;gap:clamp(1rem,1.5vw,2.2rem)}
.spin{width:clamp(32px,4vw,90px);height:clamp(32px,4vw,90px);border:clamp(3px,.3vw,6px) solid var(--border);border-top-color:var(--neon);border-radius:50%;animation:sp .85s linear infinite;box-shadow:0 0 clamp(10px,1.5vw,35px) rgba(0,245,255,.18)}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{font-size:clamp(.6rem,.9vw,1.4rem);letter-spacing:.3em;color:var(--dim)}
.errbox{background:rgba(255,68,85,.07);border:clamp(1px,.1vw,2px) solid rgba(255,68,85,.32);padding:clamp(1rem,2.5vw,3.5rem);margin:clamp(1rem,2vw,3.5rem) auto;max-width:min(1100px,90vw);text-align:center;line-height:2;border-radius:var(--r)}
.errbox h3{color:var(--red);font-size:clamp(.75rem,1.5vw,2.2rem);margin-bottom:.8rem;letter-spacing:.12em}
.errbox p{font-size:clamp(.6rem,.9vw,1.3rem);color:var(--dim)}
.empty{text-align:center;padding:clamp(2.5rem,6vw,7rem) 1rem;color:var(--dim);font-size:clamp(.65rem,.9vw,1.6rem);letter-spacing:.16em}
.na{text-align:center;padding:clamp(2rem,5vw,6rem) 1rem;color:var(--dim);font-size:clamp(.62rem,.85vw,1.4rem);letter-spacing:.2em}

/* ════ BRACKET INFO ════ */
.binfo{background:rgba(0,245,255,.04);border:clamp(1px,.08vw,2px) solid rgba(0,245,255,.13);padding:clamp(.55rem,.9vw,1.3rem) clamp(.8rem,1.5vw,2.5rem);margin-bottom:clamp(.8rem,1.2vw,2rem);border-radius:var(--r);display:flex;gap:clamp(.6rem,2vw,5rem);flex-wrap:wrap;font-size:clamp(.58rem,.75vw,1.3rem)}
.binfo span b{color:var(--neon)}

/* ════ QUALIFIER TABLE ════ */
.qtbl{width:100%;border-collapse:collapse;font-size:clamp(.6rem,.8vw,1.3rem)}
.qtbl th{padding:clamp(.4rem,.7vw,1.1rem) clamp(.55rem,.9vw,1.5rem);text-align:left;border-bottom:clamp(1px,.08vw,2px) solid var(--border);color:var(--dim);font-size:clamp(.48rem,.58vw,.95rem);letter-spacing:.2em}
.qtbl td{padding:clamp(.36rem,.6vw,1rem) clamp(.55rem,.9vw,1.5rem);border-bottom:1px solid var(--border2)}
.qrow.q{background:rgba(170,255,0,.03)}.qrow.q td:first-child{color:var(--acid)}
.qdiv td{background:rgba(255,68,85,.05);color:var(--red);font-size:clamp(.48rem,.58vw,.95rem);letter-spacing:.2em;padding:clamp(.26rem,.45vw,.7rem) clamp(.55rem,.9vw,1.5rem);border-top:clamp(1px,.08vw,2px) solid rgba(255,68,85,.2)}
.rnk{color:var(--dim);font-weight:bold}.rnk.t{color:var(--acid)}
.bdg{display:inline-block;font-size:clamp(.44rem,.55vw,.88rem);padding:clamp(.08rem,.12vw,.22rem) clamp(.25rem,.4vw,.75rem);letter-spacing:.07em;border-radius:3px}
.bq{background:rgba(170,255,0,.12);border:1px solid rgba(170,255,0,.32);color:var(--acid)}
.be{background:rgba(255,68,85,.1);border:1px solid rgba(255,68,85,.28);color:var(--red)}
.bp{background:rgba(200,232,255,.04);border:1px solid rgba(200,232,255,.1);color:var(--dim)}

/* ════ BRACKET ════ */
.bwrap{overflow-x:auto;padding:clamp(.4rem,.6vw,1rem) 0;-webkit-overflow-scrolling:touch}
.bracket{display:flex;align-items:flex-start;min-width:max-content;padding:clamp(.2rem,.4vw,.6rem) clamp(.3rem,.6vw,1rem);gap:.4rem}
.bcol{display:flex;flex-direction:column;padding:0 clamp(.25rem,.4vw,.8rem);min-width:clamp(140px,16vw,360px)}
.bchdr{font-size:clamp(.5rem,.58vw,.95rem);letter-spacing:.2em;padding:clamp(.28rem,.4vw,.7rem) clamp(.2rem,.3vw,.5rem);margin-bottom:clamp(.55rem,.8vw,1.3rem);border-bottom:clamp(1px,.08vw,2px) solid;font-family:var(--fd)}
.bchdr.qual{color:var(--neon);border-color:rgba(0,245,255,.38)}
.bchdr.r32{color:var(--pink);border-color:rgba(255,0,204,.38)}
.bchdr.r16{color:var(--orange);border-color:rgba(255,170,0,.38)}
.bchdr.qf{color:#ffd000;border-color:rgba(255,208,0,.38)}
.bchdr.sf{color:#ff6200;border-color:rgba(255,98,0,.38)}
.bchdr.fn{color:var(--acid);border-color:rgba(170,255,0,.38)}
.mc{background:var(--panel);border:1px solid var(--border);margin-bottom:clamp(.4rem,.6vw,1rem);border-radius:var(--r);overflow:hidden;transition:border-color .2s,box-shadow .2s}
.mc:hover{border-color:rgba(0,245,255,.3);box-shadow:0 0 16px rgba(0,245,255,.07)}
.mcid{font-size:clamp(.44rem,.55vw,.88rem);color:var(--dim);padding:clamp(.22rem,.35vw,.55rem) clamp(.4rem,.65vw,1.1rem);background:rgba(0,0,0,.3);letter-spacing:.1em}
.mct{display:flex;align-items:center;justify-content:space-between;padding:clamp(.36rem,.6vw,.95rem) clamp(.4rem,.65vw,1.1rem);border-top:1px solid var(--border2);gap:.4rem}
.mct.win{background:rgba(170,255,0,.07)}.mct.lose{opacity:.33}.mct.bye{background:rgba(0,245,255,.055);opacity:.72}
.mcn{font-size:clamp(.56rem,.7vw,1.4rem);flex:1;word-break:break-word;min-width:0}
.mcn.tbd{color:var(--dim);font-style:italic}
.mcr{font-size:clamp(.42rem,.52vw,.85rem);padding:clamp(.08rem,.12vw,.22rem) clamp(.22rem,.35vw,.65rem);border-radius:3px;font-weight:bold;flex-shrink:0}
.mcr.win{background:rgba(170,255,0,.22);color:var(--acid)}.mcr.lose{background:rgba(255,68,85,.18);color:var(--red)}.mcr.bye{background:rgba(0,245,255,.15);color:var(--neon)}

/* ════ WINNER PODIUM ════ */
.podium{display:flex;gap:clamp(.8rem,3vw,6rem);justify-content:center;padding:clamp(1.5rem,5vw,6rem) 1rem;flex-wrap:wrap}
.pod{text-align:center;padding:clamp(.9rem,2.5vw,4.5rem) clamp(.8rem,2.5vw,4rem);min-width:clamp(130px,25vw,460px);border-radius:var(--r);transition:transform .35s ease}
.pod:hover{transform:translateY(clamp(-4px,-.4vw,-10px))}
.pod.gld{background:rgba(255,204,0,.07);border:clamp(1px,.1vw,2px) solid rgba(255,204,0,.4);box-shadow:0 0 clamp(25px,4vw,100px) rgba(255,204,0,.12)}
.pod.slv{background:rgba(184,200,216,.07);border:clamp(1px,.1vw,2px) solid rgba(184,200,216,.32);box-shadow:0 0 clamp(12px,2vw,50px) rgba(184,200,216,.09)}
.pmed{font-size:clamp(2rem,5vw,7rem);margin-bottom:clamp(.4rem,.6vw,1.1rem);line-height:1}
.ppl{font-family:var(--fd);font-size:clamp(.48rem,.6vw,.95rem);letter-spacing:.3em;opacity:.55;margin-bottom:clamp(.3rem,.4vw,.6rem)}
.pnm{font-family:var(--fd);font-size:clamp(.7rem,1.8vw,3rem);font-weight:900;color:#fff;word-break:break-word;text-shadow:0 2px 0 rgba(0,0,0,.55)}
.pod.gld .pnm{color:var(--gold);text-shadow:0 0 clamp(18px,3vw,50px) rgba(255,204,0,.45),0 2px 0 rgba(0,0,0,.55)}
.pod.slv .pnm{color:var(--silver)}

/* ════ ADMIN PANEL ════ */
.adhdr{text-align:center;padding:clamp(.8rem,1.5vw,2.2rem) 1rem clamp(.35rem,.6vw,.8rem)}
.adhdr h2{font-family:var(--fd);font-size:clamp(.82rem,1.5vw,2.5rem);color:var(--orange);letter-spacing:.2em}
.stbar{display:flex;align-items:center;justify-content:space-between;padding:clamp(.28rem,.4vw,.7rem) clamp(.8rem,1.5vw,2.5rem);background:rgba(0,0,0,.35);font-size:clamp(.52rem,.65vw,1rem);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.3rem}
.sok{color:var(--acid)}.serr{color:var(--red)}.ssav{color:var(--neon)}
.brel{background:transparent;border:clamp(1px,.08vw,2px) solid var(--border);color:var(--neon);font-family:var(--fm);font-size:clamp(.5rem,.62vw,1rem);padding:clamp(.14rem,.22vw,.35rem) clamp(.45rem,.7vw,1.2rem);cursor:pointer;letter-spacing:.1em;transition:background .2s;border-radius:2px}
.brel:hover{background:rgba(0,245,255,.08)}
.rsec{margin-bottom:clamp(1.2rem,2vw,2.8rem)}
.rhdr{font-family:var(--fd);font-size:clamp(.55rem,.72vw,1.4rem);letter-spacing:.2em;padding:clamp(.38rem,.6vw,.9rem) clamp(.65rem,1vw,1.8rem);border-left:clamp(3px,.25vw,5px) solid;margin-bottom:clamp(.55rem,.8vw,1.4rem);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.3rem}
.rhdr.qual{border-color:var(--neon);color:var(--neon);background:rgba(0,245,255,.04)}
.rhdr.r32{border-color:var(--pink);color:var(--pink);background:rgba(255,0,204,.04)}
.rhdr.r16{border-color:var(--orange);color:var(--orange);background:rgba(255,170,0,.04)}
.rhdr.qf{border-color:#ffd000;color:#ffd000;background:rgba(255,208,0,.04)}
.rhdr.sf{border-color:#ff6200;color:#ff6200;background:rgba(255,98,0,.04)}
.rhdr.fn{border-color:var(--acid);color:var(--acid);background:rgba(170,255,0,.04)}
.rhr{font-size:clamp(.5rem,.65vw,1.1rem);opacity:.6;font-family:var(--fm)}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(230px,22vw,520px),1fr));gap:clamp(.35rem,.55vw,.9rem)}
.amc{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.amc.done{border-color:rgba(170,255,0,.26);background:rgba(170,255,0,.013)}
.amid{font-size:clamp(.5rem,.62vw,.95rem);color:var(--dim);padding:clamp(.25rem,.38vw,.6rem) clamp(.55rem,.85vw,1.4rem);background:rgba(0,0,0,.25);letter-spacing:.1em;display:flex;justify-content:space-between;align-items:center}
.dtag{color:var(--acid);font-size:clamp(.44rem,.55vw,.88rem)}
.amr{display:flex;align-items:center;padding:clamp(.38rem,.6vw,.9rem) clamp(.55rem,.85vw,1.4rem);border-top:1px solid var(--border2);gap:clamp(.3rem,.45vw,.9rem);flex-wrap:wrap}
.amr.won{background:rgba(170,255,0,.05)}.amr.lost{opacity:.42}.amr.bye{background:rgba(0,245,255,.04)}
.amn{flex:1;font-size:clamp(.62rem,.78vw,1.4rem);min-width:70px}
.btns{display:flex;gap:clamp(.2rem,.3vw,.45rem);flex-shrink:0}
.bw,.bl,.bb{border:clamp(1px,.08vw,2px) solid;font-family:var(--fm);font-size:clamp(.52rem,.62vw,.95rem);padding:clamp(.22rem,.35vw,.55rem) clamp(.4rem,.65vw,1.1rem);cursor:pointer;letter-spacing:.08em;font-weight:bold;transition:background .15s,box-shadow .15s;background:transparent;border-radius:3px}
.bw{border-color:rgba(170,255,0,.45);color:var(--acid)}.bw:hover,.bw.on{background:rgba(170,255,0,.2)}
.bl{border-color:rgba(255,68,85,.4);color:var(--red)}.bl:hover,.bl.on{background:rgba(255,68,85,.2)}
.bb{border-color:rgba(0,245,255,.35);color:var(--neon)}.bb:hover,.bb.on{background:rgba(0,245,255,.18)}
.bw:disabled,.bl:disabled,.bb:disabled{opacity:.22;cursor:not-allowed}
.qigrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(190px,20vw,460px),1fr));gap:clamp(.3rem,.45vw,.65rem);margin-bottom:clamp(.8rem,1.2vw,1.8rem)}
.qi{display:flex;align-items:center;gap:clamp(.35rem,.55vw,.9rem);background:var(--panel);border:1px solid var(--border);padding:clamp(.38rem,.6vw,.9rem) clamp(.55rem,.85vw,1.4rem);border-radius:3px}
.qi.top{border-left:clamp(2px,.18vw,4px) solid var(--acid)}
.qir{width:clamp(18px,2vw,40px);font-size:clamp(.58rem,.75vw,1.2rem);color:var(--dim);text-align:center;flex-shrink:0}
.qir.t{color:var(--acid)}
.qin{flex:1;font-size:clamp(.62rem,.78vw,1.2rem);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qii{background:rgba(0,0,0,.45);border:1px solid var(--border);color:var(--text);font-family:var(--fm);font-size:clamp(.62rem,.78vw,1.2rem);padding:clamp(.22rem,.35vw,.45rem) clamp(.35rem,.55vw,.9rem);width:clamp(70px,8vw,155px);text-align:center;flex-shrink:0;border-radius:3px}
.qii:focus{outline:none;border-color:var(--neon);box-shadow:0 0 12px rgba(0,245,255,.16)}

/* ════ TOAST ════ */
.toast{position:fixed;left:50%;bottom:clamp(1rem,2vw,2.5rem);z-index:9999;transform:translateX(-50%) translateY(120px);background:var(--panel);border:clamp(1px,.08vw,2px) solid var(--border);padding:clamp(.42rem,.65vw,1.1rem) clamp(1rem,1.8vw,3rem);font-size:clamp(.6rem,.8vw,1.3rem);letter-spacing:.1em;transition:transform .28s ease;pointer-events:none;white-space:nowrap;max-width:88vw;text-align:center;border-radius:var(--r);box-shadow:0 8px 40px rgba(0,0,0,.45)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(170,255,0,.48);color:var(--acid);background:rgba(0,30,10,.92)}
.toast.err{border-color:rgba(255,68,85,.48);color:var(--red);background:rgba(30,0,10,.92)}

/* ════ PASSWORD OVERLAY ════ */
.pwov{position:fixed;inset:0;background:rgba(2,8,16,.96);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column;padding:1rem;backdrop-filter:blur(6px)}
.pwov.show{display:flex}
.pwbox{background:var(--panel);border:clamp(1px,.1vw,2px) solid var(--border);padding:clamp(1.2rem,3vw,4.5rem) clamp(1.2rem,3.5vw,5.5rem);width:min(780px,92vw);text-align:center;border-radius:var(--r);box-shadow:0 0 100px rgba(0,245,255,.07),0 30px 80px rgba(0,0,0,.55)}
.pwtit{font-family:var(--fd);font-size:clamp(.9rem,1.8vw,2.4rem);color:var(--orange);letter-spacing:.2em;margin-bottom:.4rem}
.pwsub{font-size:clamp(.55rem,.75vw,1.2rem);color:var(--dim);letter-spacing:.2em;margin-bottom:.3rem}
.pwhint{font-size:clamp(.48rem,.6vw,1rem);color:rgba(200,232,255,.2);letter-spacing:.18em;margin-bottom:clamp(1rem,1.8vw,2.2rem)}
.pwin{width:100%;background:rgba(0,0,0,.55);border:clamp(1px,.1vw,2px) solid var(--border);color:var(--text);font-family:var(--fm);font-size:clamp(.9rem,1.5vw,2rem);padding:clamp(.55rem,.9vw,1.1rem);text-align:center;letter-spacing:.3em;margin-bottom:clamp(.7rem,1.1vw,1.4rem);border-radius:3px}
.pwin:focus{outline:none;border-color:var(--neon);box-shadow:0 0 22px rgba(0,245,255,.14)}
.pwin.shake{animation:sh .4s}
@keyframes sh{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.pwerr{color:var(--red);font-size:clamp(.55rem,.7vw,1.1rem);height:clamp(.9rem,1.2vw,1.6rem);margin-bottom:.6rem}
.pwbtn{width:100%;background:rgba(255,170,0,.11);border:clamp(1px,.1vw,2px) solid rgba(255,170,0,.45);color:var(--orange);font-family:var(--fm);font-size:clamp(.65rem,.9vw,1.3rem);padding:clamp(.55rem,.9vw,1.2rem);cursor:pointer;letter-spacing:.18em;border-radius:3px;transition:background .2s,box-shadow .2s}
.pwbtn:hover{background:rgba(255,170,0,.22)}
.pwcancel{background:transparent;border:none;color:var(--dim);font-family:var(--fm);font-size:clamp(.52rem,.65vw,1rem);cursor:pointer;margin-top:.8rem;letter-spacing:.12em;display:block;width:100%;transition:color .2s}
.pwcancel:hover{color:var(--text)}

/* ════ MOBILE BOTTOM NAV ════ */
.mobnav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--mobnav-h);background:rgba(2,8,16,.98);border-top:1px solid var(--border);z-index:100}
.mobnav-inner{display:flex;height:100%}
.mtab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.18rem;font-family:var(--fm);font-size:.48rem;letter-spacing:.09em;color:var(--dim);background:transparent;border:none;cursor:pointer;transition:color .2s}
.mtab.active{color:var(--neon)}
.mtico{font-size:1.1rem;line-height:1}

/* ════ STATUS BAR ════ */
.statusbar{background:rgba(0,0,0,.45);border-top:1px solid var(--border);padding:clamp(.35rem,.5vw,.7rem) clamp(1rem,2vw,3.5rem);display:flex;justify-content:space-between;align-items:center;font-size:clamp(.48rem,.6vw,.95rem);color:rgba(200,232,255,.35);letter-spacing:.12em;flex-wrap:wrap;gap:.3rem}
.statusbar b{color:rgba(0,245,255,.5)}
.stlive{display:flex;align-items:center;gap:.55rem;font-family:var(--fd);font-size:clamp(.44rem,.55vw,.88rem);color:rgba(0,245,255,.35);letter-spacing:.18em}

/* ════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
════════════════════════════════════════ */

/* ── MOBILE (≤520px) ── */
@media(max-width:520px){
  :root{--mobnav-h:56px}
  .wrap{padding-bottom:var(--mobnav-h)}
  .mobnav{display:block}
  .vbar{display:none}
  .statusbar{display:none}
  .toast{bottom:calc(var(--mobnav-h) + .5rem)}
  .hero{padding:.85rem .65rem .6rem}
  .main{padding:.5rem .5rem}
  .mgrid{grid-template-columns:1fr}
  .qigrid{grid-template-columns:1fr 1fr}
  .bcol{min-width:136px}
  .btns{flex-wrap:wrap}
  .binfo{gap:.5rem .8rem}
  .trow,.crow{justify-content:flex-start}
}

/* ── SMALL MOBILE (≤360px) ── */
@media(max-width:360px){
  .qigrid{grid-template-columns:1fr}
  .bcol{min-width:120px}
  .btns{gap:.18rem}
}

/* ── TABLET (521–900px) ── */
@media(min-width:521px) and (max-width:900px){
  .mgrid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .qigrid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .bcol{min-width:152px}
  .btns{flex-wrap:wrap}
  .statusbar{display:none}
}

/* ── DESKTOP (901–1399px) ── */
@media(min-width:901px) and (max-width:1399px){
  .mgrid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .qigrid{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
  .bcol{min-width:188px}
}

/* ── LARGE DESKTOP (1400–2559px) ── */
@media(min-width:1400px) and (max-width:2559px){
  .mgrid{grid-template-columns:repeat(auto-fill,minmax(310px,1fr))}
  .qigrid{grid-template-columns:repeat(auto-fill,minmax(270px,1fr))}
  .bcol{min-width:215px}
  .trow,.crow{justify-content:center}
}

/* ── 4K PANEL (≥2560px) ── */
@media(min-width:2560px){
  :root{--nav-h:108px}
  html{font-size:20px}
  .mobnav{display:none!important}
  .vbar{display:flex!important}
  .statusbar{display:flex}
  .mgrid{grid-template-columns:repeat(auto-fill,minmax(520px,1fr))}
  .qigrid{grid-template-columns:repeat(auto-fill,minmax(460px,1fr))}
  .bcol{min-width:360px}
  .btns{flex-wrap:nowrap}
  .trow,.crow{justify-content:center}
}
</style>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzKw9FfKLC6xfsI9r7bH1qMHgi2mfWDlQM7gbOqsfJVmhHotJogS-FceJiRDLIoQ-0Dgw/exec';
const PW_MAP={'7-9':'789','4-6':'456','1-3':'123','IM25 3-5':'IM345','IM25 6-9':'IM6789'};
const CAT_EVENTS={'7-9':['Robo Race','Robo Soccer','Robo Kabaddi','Robo Sumo','All Terrain','Logic Robots'],'4-6':['Robo Race','Robo Kabaddi','Robo Sumo','All Terrain'],'1-3':['Robo Race','Robo Sumo'],'IM25 3-5':['Robo Race','Robo Soccer','Robo Kabaddi','Robo Sumo','All Terrain'],'IM25 6-9':['Robo Race','Robo Soccer','Robo Kabaddi','Robo Sumo','All Terrain']};
const ROUNDS_RACE=['R32','R16','QF','SF','Final'];
const ROUNDS_STD=['Qual','R32','R16','QF','SF','Final'];
const RLABEL={Qual:'QUALIFIERS',R32:'ROUND OF 32',R16:'ROUND OF 16',QF:'QUARTER FINALS',SF:'SEMI FINALS',Final:'FINAL'};
const RCLS={Qual:'qual',R32:'r32',R16:'r16',QF:'qf',SF:'sf',Final:'fn'};

let D={},admMode=false,admCat=null,curEv='Robo Race',curCat='7-9',curView='bracket',curAdmEv='Robo Race',cd=10,tmr=null;

function setResLabel(){
  const w=window.innerWidth;
  const s=w>=2560?'4K PANEL · '+w+'×'+window.innerHeight:w>=1400?'LARGE DESKTOP · '+w+'px':w>=901?'DESKTOP · '+w+'px':w>=521?'TABLET · '+w+'px':'MOBILE · '+w+'px';
  const el=document.getElementById('resLabel');if(el)el.textContent=s;
}
setResLabel();window.addEventListener('resize',setResLabel);

function gasRead(t){return fetch(SCRIPT_URL+'?type='+t+'&nc='+Date.now()).then(r=>{if(!r.ok)throw 0;return r.json();});}
function gasWrite(p){const q=Object.entries(p).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');return fetch(SCRIPT_URL+'?'+q,{method:'GET',mode:'no-cors'}).then(()=>({status:'ok'})).catch(()=>({status:'ok'}));}

function fetchScores(){
  gasRead('scoreboard').then(j=>{
    if(j.status==='ok'){D=j.data;document.getElementById('lastUp').textContent=j.updated||'—';renderSb();}
    else showErr('Script error: '+(j.message||'?'));
  }).catch(()=>showErr('Cannot connect. Deploy Apps Script with <b>Anyone</b> access + Authorize.'));
}
function loadAdmin(){
  setSt('&#9899; Loading...','s');
  gasRead('admin_get').then(j=>{
    if(j.status==='ok'){D=j.data;document.getElementById('admLoaded').textContent='Loaded '+new Date().toLocaleTimeString('en-IN');renderAdmin();setSt('&#10003; Loaded','ok');}
    else setSt('&#9888; '+(j.message||'Error'),'e');
  }).catch(()=>setSt('&#9888; Cannot connect','e'));
}
function showErr(m){document.getElementById('sbc').innerHTML=`<div class="errbox"><h3>&#9888; ERROR</h3><p>${m}</p></div>`;}

function openPw(){document.getElementById('pwov').classList.add('show');document.getElementById('pwin').focus();}
function closePw(){document.getElementById('pwov').classList.remove('show');document.getElementById('pwin').value='';document.getElementById('pwerr').textContent='';}
function checkPw(){
  const v=document.getElementById('pwin').value.trim();
  const m=Object.entries(PW_MAP).find(([c,p])=>p===v);
  if(m){admCat=m[0];closePw();enterAdmin();}
  else{const i=document.getElementById('pwin');document.getElementById('pwerr').textContent='&#9888; Wrong password';i.value='';i.classList.remove('shake');void i.offsetWidth;i.classList.add('shake');i.focus();}
}

function enterAdmin(){
  admMode=true;clearInterval(tmr);
  $('sbMode').style.display='none';$('admMode').style.display='block';
  $('mobnav').style.display='none';$('plive').style.display='none';
  $('padmin').style.display='flex';$('gchip').textContent=admCat;
  $('bopen').style.display='none';$('bexit').style.display='flex';
  $('cbar').style.display='none';$('statusbar').style.display='none';
  const al=CAT_EVENTS[admCat]||[];curAdmEv=al[0];
  document.querySelectorAll('#admEvTabs .etab').forEach(b=>{b.style.display=al.includes(b.dataset.ev)?'':'none';b.classList.toggle('active',b.dataset.ev===curAdmEv);});
  loadAdmin();toast('&#9881; Admin: Grade '+admCat,'ok');
}
function exitAdmin(){
  admMode=false;admCat=null;
  $('sbMode').style.display='block';$('admMode').style.display='none';
  $('plive').style.display='flex';
  $('padmin').style.display='none';$('bopen').style.display='flex';
  $('bexit').style.display='none';$('cbar').style.display='block';
  document.querySelectorAll('#admEvTabs .etab').forEach(b=>b.style.display='');
  if(window.innerWidth<=520){$('mobnav').style.display='block';}
  else{$('statusbar').style.display='flex';}
  startTimer();toast('&#10003; Back to scoreboard','ok');
}
function admEv(ev,btn){curAdmEv=ev;document.querySelectorAll('#admEvTabs .etab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAdmin();}

function sbEv(ev,btn){curEv=ev;document.querySelectorAll('#evTabs .etab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');updVbar();renderSb();}
function sbCat(cat,btn){
  curCat=cat;document.querySelectorAll('#catTabs .ctab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  const al=CAT_EVENTS[cat]||[];if(!al.includes(curEv)){curEv=al[0];document.querySelectorAll('#evTabs .etab').forEach(b=>b.classList.toggle('active',b.dataset.ev===curEv));}
  updEvTabs(cat);updVbar();renderSb();
}
function sbView(v){curView=v;updVbar();renderSb();}
function updEvTabs(cat){const al=CAT_EVENTS[cat]||[];document.querySelectorAll('#evTabs .etab').forEach(b=>b.classList.toggle('dis',!al.includes(b.dataset.ev)));}
function updVbar(){
  const ir=curEv==='Robo Race';
  $('vbq').style.display=ir?'':'none';$('mbq').style.display=ir?'flex':'none';
  if(!ir&&curView==='qual')curView='bracket';
  $('vbq').classList.toggle('active',curView==='qual');
  $('vbb').classList.toggle('active',curView==='bracket');
  $('vbw').classList.toggle('active',curView==='winner');
  $('mbb').classList.toggle('active',curView==='bracket');
  $('mbw').classList.toggle('active',curView==='winner');
  $('mbq').classList.toggle('active',curView==='qual');
}

function pow2(n){let p=1;while(p*2<=n)p*=2;return p;}

function renderSb(){
  const ev=curEv,cat=curCat;
  if(!(CAT_EVENTS[cat]||[]).includes(ev)){$('sbc').innerHTML='<div class="na">&#128683; Not available for this grade</div>';return;}
  const d=(D[ev]&&D[ev][cat])||{teams:[],matches:{},isRace:ev==='Robo Race'};
  if(curView==='qual'&&ev==='Robo Race')$('sbc').innerHTML=buildQual(d);
  else if(curView==='winner')$('sbc').innerHTML=buildWin(d);
  else $('sbc').innerHTML=buildBrk(d);
}

function buildQual(d){
  const ts=d.teams||[];if(!ts.length)return '<div class="empty">No qualifier data yet</div>';
  const tot=ts.length,tgt=pow2(tot),pi=(tot-tgt)*2,by=tot-pi;
  let h=`<div class="binfo"><span>Teams: <b>${tot}</b></span><span>Target: <b>${tgt}</b></span><span>Play Quals: <b style="color:var(--orange)">${pi}</b> (${pi/2} matches)</span><span>BYE: <b style="color:var(--purple)">${by}</b></span></div>`;
  h+=`<div style="overflow-x:auto"><table class="qtbl"><thead><tr><th>#</th><th>TEAM</th><th>TIME</th><th>STATUS</th></tr></thead><tbody>`;
  ts.forEach((t,i)=>{
    const r=i+1,top=r<=tgt;
    if(r===tgt+1)h+=`<tr class="qdiv"><td colspan="4">&#9660; DID NOT QUALIFY</td></tr>`;
    const b=t.time?(top?'<span class="bdg bq">&#10003; QUALIFIED</span>':'<span class="bdg be">&#10005; OUT</span>'):'<span class="bdg bp">PENDING</span>';
    h+=`<tr class="qrow${top?' q':''}"><td class="rnk${top?' t':''}">${r}</td><td>${t.name}</td><td>${t.time||'—'}</td><td>${b}</td></tr>`;
  });
  h+='</tbody></table></div>';return h;
}

function buildBrk(d){
  const rounds=d.isRace?ROUNDS_RACE:ROUNDS_STD,matches=d.matches||{};
  const active=rounds.filter(r=>matches[r]&&Object.keys(matches[r]).length);
  if(!active.length)return '<div class="empty">No bracket data yet</div>';
  let h='<div class="bwrap"><div class="bracket">';
  active.forEach(r=>{
    const cls=RCLS[r]||'';
    h+=`<div class="bcol"><div class="bchdr ${cls}">${RLABEL[r]||r}</div>`;
    const sortedMids=Object.keys(matches[r]).sort((a,b)=>{const na=parseInt(a.replace(/[^\d]/g,''))||0,nb=parseInt(b.replace(/[^\d]/g,''))||0;return na-nb;});
    sortedMids.forEach(mid=>{
      const ts=matches[r][mid],t1=ts[0]||{name:'TBD',result:''},t2=ts[1]||{name:'TBD',result:''};
      h+=`<div class="mc"><div class="mcid">${mid}</div>`;
      [t1,t2].forEach(t=>{const w=t.result==='WIN',l=t.result==='LOSE',by=t.result==='BYE';h+=`<div class="mct${w?' win':l?' lose':by?' bye':''}"><span class="mcn${t.name==='TBD'?' tbd':''}">${t.name}</span>${t.result?`<span class="mcr ${w?'win':l?'lose':by?'bye':''}">${t.result}</span>`:''}</div>`;});
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  h+='</div></div>';return h;
}

function buildWin(d){
  const f=d.matches&&d.matches['Final'];let w=null,ru=null;
  Object.values(f||{}).forEach(ts=>ts.forEach(t=>{if(t.result==='WIN')w=t;else if(t.result==='LOSE')ru=t;}));
  if(!w&&!ru)return '<div class="empty">Final not completed yet</div>';
  let h='<div class="podium">';
  if(w)h+=`<div class="pod gld"><div class="pmed">&#127942;</div><div class="ppl">CHAMPION</div><div class="pnm">${w.name}</div></div>`;
  if(ru)h+=`<div class="pod slv"><div class="pmed">&#129352;</div><div class="ppl">RUNNER-UP</div><div class="pnm">${ru.name}</div></div>`;
  h+='</div>';return h;
}

function renderAdmin(){
  const ev=curAdmEv,cat=admCat;
  const d=(D[ev]&&D[ev][cat])||{teams:[],matches:{},isRace:ev==='Robo Race'};
  const ir=d.isRace||ev==='Robo Race',rounds=ir?ROUNDS_RACE:ROUNDS_STD;
  let h='';
  if(ir){
    const tot=(d.teams||[]).length,tgt=tot?pow2(tot):32;
    h+=`<div class="rsec"><div class="rhdr qual">&#127950; QUALIFIER — TIME ENTRY<span class="rhr">Top ${tgt} advance to R32</span></div><div class="qigrid">`;
    (d.teams||[]).forEach((t,i)=>{const top=i<tgt&&t.time;h+=`<div class="qi${top?' top':''}"><span class="qir${top?' t':''}">${i+1}</span><span class="qin" title="${t.name}">${t.name}</span><input class="qii" value="${t.time||''}" placeholder="mm:ss.xx" onchange="saveTime('${esc(ev)}','${cat}','${esc(t.name)}',this.value)" onblur="saveTime('${esc(ev)}','${cat}','${esc(t.name)}',this.value)"></div>`;});
    if(!(d.teams||[]).length)h+=`<div class="empty">No teams</div>`;
    h+=`</div></div>`;
  }
  rounds.forEach(r=>{
    const mg=((d.matches||{})[r])||{},mids=Object.keys(mg);if(!mids.length)return;
    const cls=RCLS[r]||'',done=mids.filter(m=>mg[m].some(t=>t.result==='WIN'||t.result==='BYE')).length;
    h+=`<div class="rsec"><div class="rhdr ${cls}">${RLABEL[r]||r}<span class="rhr">${done}/${mids.length} done</span></div><div class="mgrid">`;
    const sortedMids2=mids.sort((a,b)=>{const na=parseInt(a.replace(/[^\d]/g,''))||0,nb=parseInt(b.replace(/[^\d]/g,''))||0;return na-nb;});
    sortedMids2.forEach(mid=>{
      const ts=mg[mid],isDone=ts.some(t=>t.result==='WIN'||t.result==='BYE');
      h+=`<div class="amc${isDone?' done':''}"><div class="amid">${mid}${isDone?' <span class="dtag">&#10003;</span>':''}</div>`;
      ts.forEach(t=>{const w=t.result==='WIN',l=t.result==='LOSE',b=t.result==='BYE';h+=`<div class="amr${w?' won':l?' lost':b?' bye':''}"><span class="amn">${t.name}</span><div class="btns"><button class="bw${w?' on':''}" onclick="setRes('${esc(ev)}','${cat}','${esc(t.name)}','${r}','WIN','${mid}')" ${isDone?'disabled':''}>WIN</button><button class="bl${l?' on':''}" onclick="setRes('${esc(ev)}','${cat}','${esc(t.name)}','${r}','LOSE','${mid}')" ${isDone?'disabled':''}>LOSE</button><button class="bb${b?' on':''}" onclick="setRes('${esc(ev)}','${cat}','${esc(t.name)}','${r}','BYE','${mid}')" ${isDone?'disabled':''}>BYE</button></div></div>`;});
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  if(!h)h='<div class="empty">No data. Check sheet tab names and headers.</div>';
  $('admc').innerHTML=h;
}

function setRes(ev,cat,team,round,result,mid){
  setSt('&#9899; Saving...','s');
  gasWrite({type:'admin_set',event:ev,cat,team,round,result}).then(()=>{
    toast('&#10003; '+team+' &#8594; '+result,'ok');setSt('&#10003; Saved','ok');
    const d=D[ev]&&D[ev][cat];
    if(d){
      (d.teams||[]).forEach(t=>{if(t.name===team)t[round+'_result']=result;});
      const grp=((d.matches||{})[round]||{})[mid]||[];
      grp.forEach(t=>{if(t.name!==team){const o=(result==='WIN'||result==='BYE')?'LOSE':'WIN';t.result=o;(d.teams||[]).forEach(tt=>{if(tt.name===t.name)tt[round+'_result']=o;});gasWrite({type:'admin_set',event:ev,cat,team:t.name,round,result:o});}});
      rebuildM(ev,cat);renderAdmin();
    }
  });
}
function saveTime(ev,cat,team,time){if(!time)return;gasWrite({type:'admin_set_time',event:ev,cat,team,time});}
function rebuildM(ev,cat){
  const d=D[ev]&&D[ev][cat];if(!d)return;
  const ir=d.isRace||ev==='Robo Race',rounds=ir?ROUNDS_RACE:ROUNDS_STD,matches={};
  rounds.forEach(r=>{const g={};(d.teams||[]).forEach(t=>{const m=t[r+'_match'];if(!m)return;if(!g[m])g[m]=[];if(!g[m].some(x=>x.name===t.name))g[m].push({name:t.name,result:t[r+'_result']||'',time:t.time||''});});matches[r]=g;});
  d.matches=matches;
}

function startTimer(){
  clearInterval(tmr);cd=10;
  tmr=setInterval(()=>{cd--;$('refIn').textContent=cd+'s';$('cbar').style.width=(cd/10*100)+'%';if(cd<=0){cd=10;if(!admMode)fetchScores();}},1000);
}
function toast(m,t){const e=$('toast');e.innerHTML=m;e.className='toast '+(t||'');e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3000);}
function setSt(m,t){const e=$('saveSt');e.innerHTML=m;e.className=t==='ok'?'sok':t==='e'?'serr':t==='s'?'ssav':'';}
function esc(s){return String(s).replace(/'/g,"\\'");}
function $(id){return document.getElementById(id);}

// Particles — scale count to screen size
(function(){
  const c=$('pts'),n=window.innerWidth>=2560?35:window.innerWidth>=1400?22:window.innerWidth>=521?14:8;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='pt';
    p.style.cssText=`left:${Math.random()*100}%;animation-duration:${10+Math.random()*16}s;animation-delay:${Math.random()*14}s`;
    c.appendChild(p);
  }
})();

updEvTabs(curCat);updVbar();fetchScores();startTimer();
</script>
